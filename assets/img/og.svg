<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0907"/>
      <stop offset="100%" stop-color="#1c1410"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1c46a"/>
      <stop offset="50%" stop-color="#d4a04a"/>
      <stop offset="100%" stop-color="#7a1f2c"/>
    </linearGradient>
    <radialGradient id="glow" cx=".75" cy=".4" r=".6">
      <stop offset="0%" stop-color="#d4a04a" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#d4a04a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx=".15" cy=".8" r=".5">
      <stop offset="0%" stop-color="#7a1f2c" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#7a1f2c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- decorative plate -->
  <g transform="translate(900,315)">
    <ellipse cx="0" cy="0" rx="220" ry="220" fill="#f7efdb" opacity=".06"/>
    <ellipse cx="0" cy="0" rx="190" ry="190" fill="none" stroke="url(#accent)" stroke-width="2" opacity=".7"/>
    <ellipse cx="0" cy="0" rx="160" ry="160" fill="none" stroke="#f7efdb" stroke-width="1" opacity=".25"/>
    <circle cx="-40" cy="-30" r="40" fill="#7a1f2c" opacity=".7"/>
    <circle cx="50" cy="20" r="30" fill="#6b8e5a" opacity=".7"/>
    <circle cx="0" cy="60" r="22" fill="#d4a04a"/>
  </g>

  <!-- text (Hebrew is right-aligned for RTL look) -->
  <text x="80" y="240" font-family="Georgia, serif" font-size="64" fill="#d4a04a" font-style="italic">Lilu &amp; Chef</text>
  <text x="80" y="340" font-family="Heebo, sans-serif" font-weight="900" font-size="84" fill="#f7efdb">קייטרינג בוטיק</text>
  <text x="80" y="420" font-family="Heebo, sans-serif" font-weight="700" font-size="48" fill="#d8c9a8">כפר סבא · השרון · גוש דן</text>
  <text x="80" y="500" font-family="Heebo, sans-serif" font-weight="500" font-size="34" fill="#8c8073">תפריטים אישיים · שף פרטי · 054-484-6106</text>
</svg>
